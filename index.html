<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlackRiboZzZ Portfolio</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background-color: #0f0f0f;
            color: white;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 15px;
        }
        h1 { font-size: 22px; text-align: center; color: #0088cc; margin-bottom: 20px; }
        
        /* Сетка для работ */
        .portfolio-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* 2 колонки */
            gap: 12px;
        }
        
        .work-card {
            background: #1a1a1a;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid #333;
            transition: transform 0.2s;
        }
        .work-card:active { transform: scale(0.95); } /* Эффект нажатия */

        .work-card img {
            width: 100%;
            aspect-ratio: 16/9; /* Соотношение сторон как у превью */
            object-fit: cover;
            display: block;
        }
        
        .work-title {
            padding: 8px;
            font-size: 12px;
            text-align: center;
            background: #252525;
        }

        .footer-btn {
            display: block;
            width: 100%;
            background: #0088cc;
            color: white;
            text-align: center;
            padding: 15px 0;
            border-radius: 12px;
            text-decoration: none;
            font-weight: bold;
            margin-top: 25px;
            border: none;
        }
    </style>
</head>
<body>

    <h1>🎨 Мои работы</h1>

    <div class="portfolio-grid">
        <div class="work-card" onclick="sendChoice('YouTube Превью')">
            <img src="work1.jpg" alt="Превью">
            <div class="work-title">Превью YouTube</div>
        </div>

        <div class="work-card" onclick="sendChoice('Карточки товаров')">
            <img src="work2.jpg" alt="Карточка">
            <div class="work-title">Ozon / WB</div>
        </div>

        <div class="work-card" onclick="sendChoice('Логотип')">
            <img src="work3.jpg" alt="Лого">
            <div class="work-title">Логотипы</div>
        </div>

        <div class="work-card" onclick="sendChoice('Монтаж')">
            <img src="work4.jpg" alt="Монтаж">
            <div class="work-title">Монтаж видео</div>
        </div>
    </div>

    <button class="footer-btn" onclick="tg.close()">Вернуться в бота</button>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        // Функция отправляет название услуги обратно в бот и закрывает окно
        function sendChoice(service) {
            tg.sendData(service);
            tg.close();
        }
    </script>
</body>
</html>
