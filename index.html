<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BlackRiboZzZ Studio</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0088cc;
            --bg: #0f0f0f;
            --card-bg: rgba(26, 26, 26, 0.8);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            -webkit-user-select: none;
        }

        /* Навигация (Вкладки) */
        .tabs {
            position: sticky;
            top: 0;
            display: flex;
            background: rgba(15, 15, 15, 0.8);
            backdrop-filter: blur(10px);
            z-index: 100;
            padding: 10px;
            border-bottom: 1px solid var(--border);
            justify-content: center;
            gap: 10px;
        }

        .tab-btn {
            background: transparent;
            border: none;
            color: #888;
            padding: 8px 20px;
            font-weight: 600;
            border-radius: 20px;
            cursor: pointer;
            transition: 0.3s;
        }

        .tab-btn.active {
            background: var(--primary);
            color: white;
        }

        .container {
            padding: 15px;
            padding-bottom: 100px;
        }

        /* Анимация появления секций */
        .section {
            display: none;
            animation: fadeIn 0.4s ease-out;
        }

        .section.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 { font-size: 26px; text-align: center; color: var(--primary); margin: 20px 0 5px 0; font-weight: 800; }
        .subtitle { text-align: center; color: #888; font-size: 14px; margin-bottom: 25px; }

        .section-title { 
            font-size: 18px; 
            font-weight: 700; 
            margin: 25px 0 15px 0; 
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .section-title::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        /* Карточки */
        .portfolio-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }
        
        .work-card {
            background: var(--card-bg);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid var(--border);
            transition: all 0.2s ease;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        
        .work-card:active { transform: scale(0.95); opacity: 0.8; }

        .work-card img {
            width: 100%;
            aspect-ratio: 16/9;
            object-fit: cover;
            display: block;
        }

        /* Видео */
        .video-card {
            background: var(--card-bg);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid var(--border);
            margin-bottom: 20px;
        }
        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
        }
        .video-wrapper iframe {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0;
        }
        .video-action { padding: 15px; text-align: center; }
        .order-video-btn {
            background: rgba(0, 136, 204, 0.1);
            color: var(--primary);
            border: 1px solid var(--primary);
            padding: 10px 20px;
            border-radius: 10px;
            font-weight: 700;
            width: 100%;
            cursor: pointer;
        }

        /* Форма заказа */
        .order-form {
            padding: 20px; 
            background: var(--card-bg); 
            border-radius: 20px; 
            border: 1px solid var(--border);
            backdrop-filter: blur(5px);
        }
        .order-form label { display: block; margin-bottom: 8px; font-size: 13px; color: #888; }
        
        .order-form select, .order-form input {
            width: 100%; 
            padding: 14px; 
            background: #222; 
            color: white; 
            border: 1px solid #333; 
            border-radius: 12px; 
            margin-bottom: 15px;
            box-sizing: border-box;
            font-size: 15px;
        }
        
        .order-form select:focus, .order-form input:focus {
            border-color: var(--primary);
            outline: none;
        }

        .order-submit-btn {
            width: 100%; 
            padding: 16px; 
            background: var(--primary); 
            color: white; 
            border: none; 
            border-radius: 14px; 
            font-weight: 800;
            font-size: 16px;
            box-shadow: 0 4px 15px rgba(0, 136, 204, 0.3);
        }

        .footer-btn {
            display: block;
            width: 90%;
            margin: 30px auto;
            color: #555;
            background: transparent;
            border: none;
            font-size: 14px;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('portfolio')">Портфолио</button>
        <button class="tab-btn" onclick="switchTab('order')">Заказать</button>
    </div>

    <div class="container">
        <div id="portfolio" class="section active">
            <h1>🎨 RiboZzZ Studio</h1>
            <div class="subtitle">Лучший дизайн для твоего контента</div>

            <div class="section-title">🖼 YouTube Превью</div>
            <div class="portfolio-grid">
                <div class="work-card" onclick="sendChoice('🖼 Превью')"><img src="work1.jpg"></div>
                <div class="work-card" onclick="sendChoice('🖼 Превью')"><img src="work2.jpg"></div>
                <div class="work-card" onclick="sendChoice('🖼 Превью')"><img src="work3.jpg"></div>
                <div class="work-card" onclick="sendChoice('🖼 Превью')"><img src="work4.jpg"></div>
                <div class="work-card" onclick="sendChoice('🖼 Превью')"><img src="work5.png"></div>
                <div class="work-card" onclick="sendChoice('🖼 Превью')"><img src="work6.jpg"></div>
                <div class="work-card" onclick="sendChoice('🖼 Превью')"><img src="work7.jpg"></div>
                <div class="work-card" onclick="sendChoice('🖼 Превью')"><img src="work8.jpg"></div>
            </div>

            <div class="section-title">🎬 Монтаж видео</div>
            <div class="video-card">
                <div class="video-wrapper">
                    <iframe src="https://www.youtube.com/embed/ONnewgyIcUY" allowfullscreen></iframe>
                </div>
                <div class="video-action">
                    <button class="order-video-btn" onclick="sendChoice('🎬 Монтаж')">Хочу такой монтаж</button>
                </div>
            </div>

            <div class="video-card">
                <div class="video-wrapper">
                    <iframe src="https://www.youtube.com/embed/st29Vi1LRnc" allowfullscreen></iframe>
                </div>
                <div class="video-action">
                    <button class="order-video-btn" onclick="sendChoice('🎬 Монтаж')">Заказать монтаж</button>
                </div>
            </div>
        </div>

        <div id="order" class="section">
            <h1>📦 Оформить заказ</h1>
            <div class="subtitle">Заполни данные и я свяжусь с тобой</div>
            
            <div class="order-form">
                <label>Что отрисуем?</label>
                <select id="service-select">
                    <option value="Превью YouTube">🖼 Превью YouTube</option>
                    <option value="Карточка Ozon/WB">📊 Карточка Ozon/WB</option>
                    <option value="Монтаж видео">🎬 Монтаж видео</option>
                    <option value="Логотип">🎨 Логотип</option>
                </select>
                
                <label>Когда нужно готовое?</label>
                <input type="text" id="deadline-input" placeholder="Например: за 24 часа">
                
                <button class="order-submit-btn" onclick="orderNow()">Создать проект 🚀</button>
            </div>
        </div>

        <button class="footer-btn" onclick="tg.close()">Вернуться назад</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        // Настройка главной кнопки
        tg.MainButton.setText("ОБСУДИТЬ В ЛИЧКЕ 💬");
        tg.MainButton.setParams({ color: "#0088cc", is_visible: true });
        tg.MainButton.onClick(() => {
            tg.HapticFeedback.notificationOccurred('success');
            tg.sendData("Нужна консультация");
            tg.close();
        });

        // Функция переключения вкладок
        function switchTab(tabId) {
            tg.HapticFeedback.impactOccurred('light');
            
            // Убираем активные классы
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            
            // Добавляем активные классы
            document.getElementById(tabId).classList.add('active');
            event.currentTarget.classList.add('active');
            
            window.scrollTo(0,0);
        }

        function sendChoice(service) {
            tg.HapticFeedback.impactOccurred('medium');
            tg.sendData(service);
            tg.close();
        }

        function orderNow() {
            tg.HapticFeedback.notificationOccurred('success');
            let service = document.getElementById('service-select').value;
            let deadline = document.getElementById('deadline-input').value;
            
            let orderData = {
                service: service,
                deadline: deadline || "Не указан",
                type: "mini_app_order"
            };
            
            tg.sendData(JSON.stringify(orderData));
            tg.close();
        }
    </script>
</body>
</html>
