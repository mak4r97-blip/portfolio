<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlackRiboZzZ Portfolio</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background-color: #0f0f0f;
            color: white;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 15px;
            -webkit-user-select: none;
        }
        h1 { font-size: 24px; text-align: center; color: #0088cc; margin-bottom: 5px; }
        .subtitle { text-align: center; color: #888; font-size: 14px; margin-bottom: 25px; }
        
        .section-title { 
            font-size: 18px; 
            font-weight: bold; 
            margin: 30px 0 15px 5px; 
            border-left: 4px solid #0088cc; 
            padding-left: 10px; 
        }

        /* Сетка для превью */
        .portfolio-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }
        
        .work-card {
            background: #1a1a1a;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #333;
            transition: transform 0.1s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .work-card:active { transform: scale(0.97); }

        .work-card img {
            width: 100%;
            aspect-ratio: 16/9;
            object-fit: cover;
            display: block;
        }

        /* Видео-контейнер */
        .video-card {
            background: #1a1a1a;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #333;
            margin-bottom: 20px;
        }
        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 */
            height: 0;
        }
        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }
        .video-action {
            padding: 12px;
            text-align: center;
        }
        .order-video-btn {
            background: #222;
            color: #0088cc;
            border: 1px solid #0088cc;
            padding: 8px 15px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 13px;
            cursor: pointer;
        }

        .footer-btn {
            display: block;
            width: 100%;
            background: #0088cc;
            color: white;
            text-align: center;
            padding: 16px 0;
            border-radius: 14px;
            text-decoration: none;
            font-weight: bold;
            margin-top: 30px;
            border: none;
            font-size: 16px;
        }
    </style>
</head>
<body>

    <h1>🎨 Дизайн от RiboZzZ</h1>
    <div class="subtitle">Нажми на работу, чтобы заказать дизайн или монтаж</div>

    <div class="section-title">🖼 YouTube Превью</div>
    <div class="portfolio-grid">
        <div class="work-card" onclick="sendChoice('🖼 Превью')">
            <img src="work1.jpg" alt="Превью 1">
        </div>
        <div class="work-card" onclick="sendChoice('🖼 Превью')">
            <img src="work2.jpg" alt="Превью 2">
        </div>
        <div class="work-card" onclick="sendChoice('🖼 Превью')">
            <img src="work3.jpg" alt="Превью 3">
        </div>
        <div class="work-card" onclick="sendChoice('🖼 Превью')">
            <img src="work4.jpg" alt="Превью 4">
        </div>
        <div class="work-card" onclick="sendChoice('🖼 Превью')">
            <img src="work5.png" alt="Превью 5">
        </div>
    </div>

    <div class="section-title">🎬 Монтаж видео</div>
    
    <div class="video-card">
        <div class="video-wrapper">
            <iframe src="https://www.youtube.com/embed/ONnewgyIcUY" allowfullscreen></iframe>
        </div>
        <div class="video-action">
            <button class="order-video-btn" onclick="sendChoice('🎬 Монтаж')">Заказать похожий монтаж</button>
        </div>
    </div>

    <div class="video-card">
        <div class="video-wrapper">
            <iframe src="https://www.youtube.com/embed/st29Vi1LRnc" allowfullscreen></iframe>
        </div>
        <div class="video-action">
            <button class="order-video-btn" onclick="sendChoice('🎬 Монтаж')">Хочу такой же монтаж</button>
        </div>
    </div>

    <div class="section-title" style="opacity: 0.5;">📈 Карточки Ozon/WB (Скоро)</div>

    <button class="footer-btn" onclick="tg.close()">🔙 Вернуться в бота</button>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        function sendChoice(service) {
            tg.sendData(service);
            tg.close();
        }
    </script>
</body>
</html>
